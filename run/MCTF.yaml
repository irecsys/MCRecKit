gpu_id: 0
use_gpu: True
show_progress: False
print_loss: False
save_pth: False
seed: 2024
use_tensorboard: False

# data settings
dataset: itm
field_separator: ","
USER_ID_FIELD: user_id
ITEM_ID_FIELD: item_id
LABEL_FIELD: rating
MULTI_LABEL_FIELD: ['app', 'data', 'ease']
RATING_RANGE: [1, 5]
# rating threshold to determine the relevance of an item
threshold: {'rating': 3}


load_col: ~  # using ~ to load all columns in data
neg_sampling: ~

model: MCTF
learner: adam
eval_args:
  # split: {'RS':[0.8,0.1,0.1]}
  split: {'CV': 5, 'parallel': True, 'num_processes': 8} # N-fold cross validation by multiprocessing
  group_by: user
  order: RO
  mode: labeled

topk: [10, 20, 30, 40, 50]
metrics: ['Recall', 'Precision', 'NDCG']
valid_metric: Recall@10

# --- MCTF Model ---
weight_decay: 0.0001
stopping_step: 10
latent_dims: 64
learning_rate: 0.05
epochs: 15
train_batch_size: 2048